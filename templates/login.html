<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockHub — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Clash+Display:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #06090f;
  --surface: #0c1219;
  --card: #111b25;
  --border: #1c2d3e;
  --accent: #00d4ff;
  --green: #00ff88;
  --red: #ff3b5c;
  --text: #b8c8d8;
  --text-dim: #4a6070;
  --mono: 'DM Mono', monospace;
  --display: 'Clash Display', sans-serif;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,212,255,0.08) 0%, transparent 60%),
    linear-gradient(rgba(0,212,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.02) 1px, transparent 1px);
  background-size: auto, 50px 50px, 50px 50px;
  pointer-events: none;
}
.wrap {
  width: 100%;
  max-width: 420px;
  padding: 24px;
  position: relative;
  z-index: 1;
}
.logo {
  text-align: center;
  margin-bottom: 40px;
}
.logo-mark {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.logo-icon {
  width: 36px;
  height: 36px;
  border: 2px solid var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}
.logo-text {
  font-family: var(--display);
  font-size: 22px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -0.5px;
}
.logo-sub {
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 3px;
  text-transform: uppercase;
}
.card {
  background: var(--card);
  border: 1px solid var(--border);
  padding: 36px 32px;
}
.card-title {
  font-family: var(--display);
  font-size: 18px;
  font-weight: 600;
  color: #fff;
  margin-bottom: 4px;
}
.card-sub {
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 28px;
}
.field { margin-bottom: 18px; }
label {
  display: block;
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  color: #fff;
  font-family: var(--mono);
  font-size: 13px;
  padding: 11px 14px;
  outline: none;
  transition: border-color 0.2s;
}
input:focus { border-color: var(--accent); }
input::placeholder { color: var(--text-dim); }
.btn {
  width: 100%;
  background: var(--accent);
  color: #000;
  border: none;
  font-family: var(--display);
  font-size: 14px;
  font-weight: 700;
  padding: 13px;
  cursor: pointer;
  letter-spacing: 0.5px;
  transition: opacity 0.2s;
  margin-top: 8px;
}
.btn:hover { opacity: 0.85; }
.link {
  text-align: center;
  margin-top: 20px;
  font-size: 12px;
  color: var(--text-dim);
}
.link a { color: var(--accent); text-decoration: none; }
.flash {
  padding: 10px 14px;
  font-size: 12px;
  margin-bottom: 20px;
  border-left: 3px solid var(--red);
  background: rgba(255,59,92,0.08);
  color: #ff8fa3;
}
.flash.success {
  border-color: var(--green);
  background: rgba(0,255,136,0.06);
  color: #80ffbb;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-mark">
      <div class="logo-icon">📈</div>
      <span class="logo-text">StockHub</span>
    </div>
    <div class="logo-sub">Automated Monitoring System</div>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash {{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <div class="card">
    <div class="card-title">Sign In</div>
    <div class="card-sub">Access your monitoring dashboard</div>
    <form method="POST">
      <div class="field">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@email.com" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn">LOGIN →</button>
    </form>
  </div>
  <div class="link">No account? <a href="/register">Register here</a></div>
</div>
</body>
</html>
